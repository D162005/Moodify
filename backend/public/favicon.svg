<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <!-- Vibrant, energetic gradient for the main "Moodify" wave/smile -->
    <linearGradient id="moodify-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    
    <!-- Deep accent gradient for the eyes/audio dots -->
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2af598" />
      <stop offset="100%" stop-color="#009efd" />
    </linearGradient>
  </defs>

  <!-- Outer sleek squircle border container (App Icon style) -->
  <rect x="5" y="5" width="90" height="90" rx="24" stroke="url(#moodify-gradient)" stroke-width="4" stroke-dasharray="none" fill="none" />

  <!-- The "Moodify Eyes" - Styled like vertical equalizer/audio bars -->
  <rect x="38" y="32" width="6" height="14" rx="3" fill="url(#accent-gradient)" />
  <rect x="56" y="32" width="6" height="14" rx="3" fill="url(#accent-gradient)" />

  <!-- The "Moodify Smile" - Dynamic audio wave curving upward into a happy grin -->
  <path d="M28 54 C 32 72, 68 72, 72 54" stroke="url(#moodify-gradient)" stroke-width="7" stroke-linecap="round" />

  <!-- Play button hint subtly integrated into the smile's corner (Music Player identity) -->
  <polygon points="71,51 77,55 71,59" fill="#00f2fe" />
</svg>
