<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4e2ef3"/> <!-- Indigo -->
            <stop offset="100%" stop-color="#210d72"/> <!-- Dark Violet -->
        </linearGradient>
        <!-- Play Button Gradient -->
        <linearGradient id="play_grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fffb99"/> <!-- Light Yellow -->
            <stop offset="100%" stop-color="#ff9900"/> <!-- Orange -->
        </linearGradient>
    </defs>

    <!-- Outer Glow Square -->
    <rect x="0" y="0" width="512" height="512" rx="100" ry="100" 
          stroke="#00ffff" stroke-width="12" fill="#000" />
    
    <!-- Main Indigo Inner Background Square -->
    <rect x="10" y="10" width="492" height="492" rx="90" ry="90" 
          fill="url(#bg_grad)" />

    <!-- Light Blue Circular Container -->
    <circle cx="256" cy="256" r="215" fill="#a0e7f7" stroke="#4a56a0" stroke-width="10"/>

    <!-- Player Controls (Triangle and Bars) -->
    <!-- Play Triangle -->
    <polygon points="190,180 190,300 270,240" fill="url(#play_grad)" />
    <!-- Pause Bars -->
    <rect x="290" y="180" width="30" height="120" rx="15" ry="15" fill="#4a56a0" />
    <rect x="335" y="180" width="30" height="120" rx="15" ry="15" fill="#4a56a0" />

    <!-- Smile (Curved Path) -->
    <path d="M 170 330 Q 256 410 342 330" 
          stroke="#210d72" stroke-width="16" stroke-linecap="round" fill="none" />
    
    <!-- Sound Wave Bars (Right side) -->
    <rect x="400" y="270" width="10" height="40" rx="5" fill="#210d72" />
    <rect x="415" y="260" width="10" height="60" rx="5" fill="#210d72" />
    <rect x="430" y="280" width="10" height="20" rx="5" fill="#210d72" />
    
</svg>
